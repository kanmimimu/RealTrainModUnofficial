<!doctype html>
<!--
  本家 WebCTC TeCon (列車運行盤) ページ群の忠実レプリカ。
    /p/tecons            → TeConList.kt   (一覧 + Add)
    /p/tecons/edit/{id}  → TeConEdit.kt   (上1/3: 地図 + RailGroup リスト、下: 盤面エディタ)
    /p/tecons/view/{id}  → TeConView.kt   (盤面ビューア: てこ操作 / 進路予約 / 在線表示)
  盤面はドット格子 (32px) スナップの SVG。図形・配色・ジオメトリは本家 editor/element/* の値:
    RailLine: 在線=red / 予約=yellow / 鎖錠=orange / RG未割当=gray / 通常=white (±4 の四角形パス)
    Signal: r=12 円 (現示>1 で LawnGreen)、Lever: L/R 28x28 角丸 (有効=lightgreen, 動作=gold/orange)
    Route: r=18 円 (開通=gold)。
-->
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WebCTC - TeCon</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:'Noto Sans JP',sans-serif;display:flex;flex-direction:column;height:100vh;overflow:hidden}
  header{position:sticky;top:0;background:#3d3d3d;display:flex;align-items:center;justify-content:space-between;
         padding:8px 24px;box-shadow:0 2px 4px -1px rgba(0,0,0,.2),0 4px 5px 0 rgba(0,0,0,.14);z-index:10}
  .logo-btn{background:none;border:none;padding:8px;cursor:pointer}
  .logo{height:50px;padding:5px 15px;background:white;border-radius:10px;display:block}
  #page{flex:1;display:flex;flex-direction:column;min-height:0}
  button{cursor:pointer;font-size:13px}
  .btn{background:#1976d2;color:white;border:none;border-radius:4px;padding:8px 14px}
  .btn:disabled{background:#9e9e9e}
  .btn.outlined{background:none;color:#1976d2;border:1px solid #1976d2;padding:4px 10px}
  .btn.danger{background:#d32f2f}
  .icon-btn{background:none;border:none;padding:2px 6px;font-size:14px;opacity:.7}
  .icon-btn:hover{opacity:1}
  input[type=text],input[type=number],select,textarea{padding:6px 8px;border:1px solid #aaa;border-radius:4px;font-size:13px}
  /* 一覧 (TeConList) */
  #listwrap{max-width:900px;margin:24px auto;width:100%;padding:0 16px}
  .card{background:white;border-radius:4px;padding:16px;box-shadow:0 2px 1px -1px rgba(0,0,0,.2),0 1px 3px 0 rgba(0,0,0,.12)}
  ul.plain{list-style:none;margin:8px 0 0;padding:0}
  ul.plain li{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;
              border-bottom:1px solid rgba(0,0,0,.08);cursor:pointer}
  ul.plain li:hover{background:rgba(0,0,0,.04)}
  /* エディタ / ビューア */
  #topmap{height:33%;display:flex;position:relative;min-height:0}
  #mapsvg{flex:1;background:darkslategray;touch-action:none;cursor:grab}
  #rgpanel{position:absolute;right:0;top:0;width:30vw;height:100%;padding:16px;pointer-events:none}
  #rgpaper{background:rgba(255,255,255,0.4);height:100%;overflow:auto;border-radius:4px;pointer-events:auto}
  .rg-item{display:flex;justify-content:space-between;align-items:center;background:white;padding:6px 10px;
           border-bottom:1px solid rgba(0,0,0,.06);font-size:13px;cursor:pointer}
  .rg-item.active{background:rgba(25,118,210,.18)}
  #board{flex:1;display:flex;position:relative;min-height:0}
  #teconsvg{flex:1;background:#202020;touch-action:none;user-select:none}
  #sidepanel{position:absolute;right:0;top:0;width:30vw;height:100%;padding:16px;display:flex;flex-direction:column;
             gap:16px;pointer-events:none;overflow:hidden}
  #sidepanel .card{pointer-events:auto;overflow:auto}
  .modes{display:flex;flex-wrap:wrap;gap:4px}
  .modes button{border:1px solid #bbb;background:white;border-radius:4px;padding:6px 8px}
  .modes button.on{background:#1976d2;color:white;border-color:#1976d2}
  label.small{font-size:12px;color:#444;display:block;margin:6px 0 2px}
  .oprow{border:1px solid #ddd;border-radius:4px;padding:6px;margin:6px 0}
  .viewer-name{position:absolute;right:16px;top:16px;background:rgba(255,255,255,.4);color:white;
               border-radius:4px;padding:16px;white-space:nowrap;pointer-events:none}
</style>

<script>
"use strict";
const SVGNS = "http://www.w3.org/2000/svg";
const DOT_GAP = 32; //本家 dotGap
const path = location.pathname.replace(/\/+$/,'');
const m = path.match(/^\/p\/tecons\/(edit|view)\/([0-9a-fA-F-]+)$/);
const page = document.getElementById('page');
const esc = s => (s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

//---------------- SVG アイコン (本家は MUI icons — 絵文字は使わない) ----------------
const ICONS = {
  delete: 'M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z',
  edit: 'M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z',
  copy: 'M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z',
  add: 'M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z',
  remove: 'M19 13H5v-2h14v2z',
  home: 'M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z',
  download: 'M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z',
  dots: 'M4 8h4V4H4v4zm6 12h4v-4h-4v4zm-6 0h4v-4H4v4zm0-6h4v-4H4v4zm6 0h4v-4h-4v4zm6-10v4h4V4h-4zm-6 4h4V4h-4v4zm6 6h4v-4h-4v4zm0 6h4v-4h-4v4z',
};
function svgIcon(name, size = 16){
  return `<svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="currentColor" style="vertical-align:middle"><path d="${ICONS[name]}"/></svg>`;
}

if (!m) { renderList(); }
else if (m[1] === 'edit') { renderEditor(m[2]); }
else { renderViewer(m[2]); }

//================================================================ 一覧 (TeConList.kt)
async function renderList(){
  document.getElementById('headtitle').textContent = 'TeCon List';
  const tecons = await (await fetch('/api/tecons')).json();
  page.innerHTML = `<div id="listwrap"><div class="card">
    <h1>TeCon List</h1>
    <button class="btn outlined" id="addbtn">Add</button>
    <ul class="plain" id="tlist"></ul>
  </div></div>`;
  document.getElementById('addbtn').onclick = async () => {
    const created = await (await fetch('/api/tecons', {method:'POST'})).json();
    location.href = `/p/tecons/edit/${created.uuid}`;
  };
  const ul = document.getElementById('tlist');
  tecons.sort((a, b) => a.name.localeCompare(b.name)).forEach(tc => {
    const li = document.createElement('li');
    li.innerHTML = `<span>${esc(tc.name)}</span>`;
    const edit = document.createElement('button');
    edit.className = 'icon-btn'; edit.innerHTML = svgIcon('edit'); edit.title = '編集';
    edit.onclick = e => { e.stopPropagation(); location.href = `/p/tecons/edit/${tc.uuid}`; };
    li.appendChild(edit);
    li.onclick = () => location.href = `/p/tecons/view/${tc.uuid}`;
    ul.appendChild(li);
  });
}

//================================================================ 共通: panzoom つき SVG
function makePanzoom(svg, gRoot, opts){
  let tx = 0, ty = 0, scale = 1, paused = false;
  const apply = () => {
    gRoot.setAttribute('transform', `translate(${tx} ${ty}) scale(${scale})`);
    if (opts && opts.onTransform) opts.onTransform(tx, ty, scale);
  };
  let dragging = false, lastX = 0, lastY = 0, moved = 0;
  svg.addEventListener('pointerdown', e => { dragging = true; moved = 0; lastX = e.clientX; lastY = e.clientY; svg.setPointerCapture(e.pointerId); });
  svg.addEventListener('pointermove', e => {
    if (!dragging || paused) { lastX = e.clientX; lastY = e.clientY; return; }
    moved += Math.abs(e.clientX - lastX) + Math.abs(e.clientY - lastY);
    tx += e.clientX - lastX; ty += e.clientY - lastY;
    lastX = e.clientX; lastY = e.clientY;
    apply();
  });
  svg.addEventListener('pointerup', () => { dragging = false; });
  svg.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = svg.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const factor = e.deltaY < 0 ? 1.25 : 0.8;
    const ns = Math.max(0.05, Math.min(64, scale * factor));
    tx = mx - (mx - tx) * (ns / scale); ty = my - (my - ty) * (ns / scale);
    scale = ns; apply();
  }, { passive: false });
  apply();
  return {
    get scale(){ return scale; }, get tx(){ return tx; }, get ty(){ return ty; },
    get moved(){ return moved; },
    pause(){ paused = true; }, resume(){ paused = false; },
    home(){ tx = 0; ty = 0; scale = 1; apply(); },
    zoom(f){ scale = Math.max(0.05, Math.min(64, scale * f)); apply(); },
    toWorld(clientX, clientY){
      const rect = svg.getBoundingClientRect();
      return { x: (clientX - rect.left - tx) / scale, y: (clientY - rect.top - ty) / scale };
    }
  };
}
//格子スナップ (本家 SvgWithDot.onMouseMove)
function snap(v){
  const gap = v < 0 ? -DOT_GAP : DOT_GAP;
  return Math.round(v + gap / 2 - (v + gap / 2) % gap);
}
//ドット背景 (本家 SvgWithDot の data URI)
function dotBackground(svg, tx, ty, scale, visible){
  if (!visible) { svg.style.backgroundImage = 'none'; return; }
  const size = DOT_GAP * scale;
  svg.style.backgroundImage = "url(\"data:image/svg+xml;charset=utf8,%3Csvg%20width%3D%2232%22%20height%3D%2232%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%3E%20%3Ccircle%20cx%3D%2216%22%20cy%3D%2216%22%20r%3D%221%22%20fill%3D%22gray%22%2F%3E%3C%2Fsvg%3E\")";
  svg.style.backgroundSize = size + 'px';
  svg.style.backgroundPositionX = (size / 2 + tx % size) + 'px';
  svg.style.backgroundPositionY = (size / 2 + ty % size) + 'px';
}

//================================================================ 図形描画 (editor/element/* のジオメトリ)
function railPathD(start, end){
  const horizontal = Math.abs((end.y - start.y) / ((end.x - start.x) || 1e-9)) > 1;
  if (horizontal) {
    return `M ${start.x - 4} ${start.y} L ${end.x - 4} ${end.y} L ${end.x + 4} ${end.y} L ${start.x + 4} ${start.y} Z`;
  }
  return `M ${start.x} ${start.y - 4} L ${end.x} ${end.y - 4} L ${end.x} ${end.y + 4} L ${start.x} ${start.y + 4} Z`;
}
function railColorOf(states, hasRG){
  if (states.some(s => s.trainOnRail)) return 'red';
  if (states.some(s => s.reserved)) return 'yellow';
  if (states.some(s => s.locked)) return 'orange';
  return hasRG ? 'white' : 'gray';
}
function el(tag, attrs, parent){
  const node = document.createElementNS(SVGNS, tag);
  for (const k in attrs) node.setAttribute(k, attrs[k]);
  if (parent) parent.appendChild(node);
  return node;
}
//図形 1 個を <g> に描画。ctx = {rgStates(uuid→state), signalLevels(x,y,z→level), runtime, armed, onLever, onRoute, editor:{selected}}
function drawShape(shape, ctx){
  const g = document.createElementNS(SVGNS, 'g');
  const pos = shape.pos || {x:0, y:0};
  const states = uuids => (uuids || []).map(u => ctx.rgStates[u]).filter(Boolean);
  switch (shape.type) {
    case 'RailLine': {
      g.setAttribute('transform', `translate(${pos.x} ${pos.y})`);
      const color = railColorOf(states(shape.railGroupList), (shape.railGroupList || []).length > 0);
      el('path', { d: railPathD(shape.start || {x:0,y:0}, shape.end), fill: color, stroke: 'none' }, g);
      break;
    }
    case 'RailPolyLine': {
      g.setAttribute('transform', `translate(${pos.x} ${pos.y})`);
      const color = railColorOf(states(shape.railGroupList), (shape.railGroupList || []).length > 0);
      const pts = shape.points || [];
      for (let i = 0; i + 1 < pts.length; i++) {
        el('path', { d: railPathD(pts[i], pts[i + 1]), fill: color, stroke: 'none' }, g);
      }
      break;
    }
    case 'Signal': {
      const level = ctx.signalLevels[`${(shape.signalPos||{}).x},${(shape.signalPos||{}).y},${(shape.signalPos||{}).z}`] || 0;
      const noPos = !shape.signalPos || (shape.signalPos.x === 0 && shape.signalPos.y === 0 && shape.signalPos.z === 0);
      g.setAttribute('transform', `translate(${pos.x} ${pos.y}) rotate(${shape.rotation ?? 0})`);
      g.setAttribute('stroke', noPos ? 'gray' : 'white');
      g.setAttribute('fill', level > 1 ? 'LawnGreen' : '#202020');
      if (shape.rotation != null) {
        el('line', {x1:0, y1:12, x2:0, y2:32, 'stroke-width':4}, g);
        el('line', {x1:12, y1:32, x2:-12, y2:32, 'stroke-width':4}, g);
      }
      el('circle', {r:12, 'stroke-width':4}, g);
      break;
    }
    case 'TeConLever': {
      g.setAttribute('transform', `translate(${pos.x} ${pos.y}) rotate(${shape.rotation || 0})`);
      g.setAttribute('stroke', 'white');
      el('line', {x1:-28, y1:0, x2:28, y2:0, 'stroke-width':4}, g);
      el('circle', {r:6, fill:'white', stroke:'none'}, g);
      const rt = ctx.runtime && ctx.runtime.leverStates.find(s => s.leverId === shape.id);
      const armed = ctx.armed && ctx.armed.leverId === shape.id ? ctx.armed.side : null;
      const sideColor = (side, config) => {
        if (!config || config.kind === 'disabled') return '#303030';
        if (rt && rt.activeSide === side) return rt.cancelable ? 'gold' : 'orange';
        if (armed === side) return 'lightgreen';
        return '#d0d0d0';
      };
      for (const [side, x] of [['L', -42], ['R', 14]]) {
        const config = side === 'L' ? shape.left : shape.right;
        const rect = el('rect', {x, y:-14, width:28, height:28, rx:4, ry:4,
          fill: sideColor(side, config), 'stroke-width':2}, g);
        if (ctx.onLever && config && config.kind !== 'disabled') {
          rect.style.cursor = 'pointer';
          rect.addEventListener('click', e => { e.stopPropagation(); ctx.onLever(shape, side); });
        }
      }
      if (shape.name) {
        el('text', {y:-22, 'text-anchor':'middle', fill:'white', stroke:'none', 'font-size':12}, g)
          .textContent = shape.name;
      }
      break;
    }
    case 'Route': {
      g.setAttribute('transform', `translate(${pos.x} ${pos.y})`);
      const enabled = ctx.enabledRoutes && ctx.enabledRoutes.has(shape.id);
      const active = ctx.runtime && ctx.runtime.leverStates.some(s => s.routeId === shape.id);
      const fill = active ? 'gold' : enabled ? 'lightgreen' : (ctx.editor ? '#707070' : '#404040');
      const c = el('circle', {r:18, fill, stroke:'white', 'stroke-width':4}, g);
      if (ctx.onRoute && enabled) {
        c.style.cursor = 'pointer';
        c.addEventListener('click', e => { e.stopPropagation(); ctx.onRoute(shape); });
      }
      el('text', {y:5, 'text-anchor':'middle', fill:'black', stroke:'none', 'pointer-events':'none'}, g)
        .textContent = shape.name || shape.id || 'Route';
      break;
    }
    case 'FreeText': {
      g.setAttribute('transform', `translate(${pos.x} ${pos.y})`);
      const t = el('text', {fill: shape.color || 'white', stroke:'none',
        'font-size': shape.size || 12, 'text-anchor': shape.anchor || 'start'}, g);
      t.textContent = shape.text || 'FreeText';
      break;
    }
    case 'RectBox': {
      g.setAttribute('transform', `translate(${pos.x} ${pos.y})`);
      const s = shape.start || {x:0,y:0}, e2 = shape.end;
      el('rect', {x: Math.min(s.x, e2.x), y: Math.min(s.y, e2.y),
        width: Math.abs(s.x - e2.x), height: Math.abs(s.y - e2.y),
        rx:8, ry:8, fill:'none', stroke:'white', 'stroke-width':8}, g);
      break;
    }
    case 'TrainNumber': {
      g.setAttribute('transform', `translate(${pos.x} ${pos.y})`);
      const trainName = states(shape.railGroupList).map(s => s.trainName).find(n => n);
      const s = shape.start || {x:0,y:0}, e2 = shape.end;
      const minX = Math.min(s.x, e2.x), minY = Math.min(s.y, e2.y);
      const w = Math.abs(s.x - e2.x), h = Math.abs(s.y - e2.y);
      el('rect', {x:minX, y:minY, width:w, height:h, fill:'gray',
        stroke: trainName ? 'orange' : 'white', 'stroke-width':2}, g);
      if (trainName) {
        const size = shape.size || 24;
        const t = el('text', {x: minX + w/2, y: minY + h/2 + size/2 - 2, stroke:'none', fill:'orange',
          'font-size': size, 'text-anchor': shape.anchor || 'middle'}, g);
        t.textContent = trainName;
      }
      break;
    }
  }
  if (ctx.editorSelected) {
    g.setAttribute('opacity', '0.6');
  }
  return g;
}

//================================================================ ビューア (TeConView.kt + TeConViewerComponent.kt)
async function renderViewer(uuid){
  const res = await fetch(`/api/tecons/${uuid}`);
  if (!res.ok) { location.href = '/p/tecons'; return; }
  const tecon = await res.json();
  document.getElementById('headtitle').textContent = tecon.name;
  page.innerHTML = `<div id="board">
    <svg id="teconsvg" xmlns="http://www.w3.org/2000/svg"><g id="troot"></g></svg>
    <div class="viewer-name">${esc(tecon.name)}</div>
  </div>`;
  const svg = document.getElementById('teconsvg');
  const root = document.getElementById('troot');
  const pz = makePanzoom(svg, root, {});

  const parts = tecon.parts || [];
  const rgUuids = [...new Set(parts.flatMap(p => p.railGroupList || []))];
  let rgStates = {}, signalLevels = {}, runtime = null;
  let armed = null; //{leverId, side}

  async function poll(){
    try {
      const [states, signals, rt] = await Promise.all([
        rgUuids.length ? fetch(`/api/railgroups/state?uuids=${rgUuids.join(',')}`).then(r => r.json()) : [],
        fetch('/api/signals').then(r => r.json()).catch(() => []),
        fetch(`/api/tecons/${uuid}/runtime`).then(r => r.json())
      ]);
      rgStates = Object.fromEntries(states.map(s => [s.uuid, s]));
      signalLevels = Object.fromEntries(signals.map(s => [`${s.pos.x},${s.pos.y},${s.pos.z}`, s.signalLevel]));
      runtime = rt;
      draw();
    } catch (e) {}
  }

  async function operate(request){
    const res = await fetch(`/api/tecons/${uuid}/operate`, {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(request)});
    try { runtime = (await res.json()).runtimeState; } catch (e) {}
    draw();
  }
  function onLever(lever, side){
    const rt = runtime && runtime.leverStates.find(s => s.leverId === lever.id);
    if (rt && rt.activeSide === side) {
      //復位 (本家 RETURN)
      operate({leverId: lever.id, side, routeId: rt.routeId, actionType: 'RETURN'});
      armed = null;
      return;
    }
    if (armed && armed.leverId === lever.id && armed.side === side) { armed = null; draw(); return; }
    const config = side === 'L' ? lever.left : lever.right;
    if (!config) return;
    if (config.kind === 'direct') {
      operate({leverId: lever.id, side, actionType: 'REQUEST'});
      armed = null;
    } else if (config.kind === 'select' && (config.actions || []).length) {
      armed = {leverId: lever.id, side};
      draw();
    }
  }
  function onRoute(route){
    if (!armed) return;
    const lever = parts.find(p => p.type === 'TeConLever' && p.id === armed.leverId);
    if (!lever) return;
    const config = armed.side === 'L' ? lever.left : lever.right;
    if (config && config.kind === 'select' && (config.actions || []).some(a => a.routeId === route.id)) {
      operate({leverId: lever.id, side: armed.side, routeId: route.id, actionType: 'REQUEST'});
      armed = null;
    }
  }
  function enabledRoutes(){
    const set = new Set();
    if (!armed) return set;
    const lever = parts.find(p => p.type === 'TeConLever' && p.id === armed.leverId);
    if (!lever) return set;
    const config = armed.side === 'L' ? lever.left : lever.right;
    if (config && config.kind === 'select') (config.actions || []).forEach(a => a.routeId && set.add(a.routeId));
    return set;
  }
  function draw(){
    root.textContent = '';
    const ctx = {rgStates, signalLevels, runtime, armed, onLever, onRoute, enabledRoutes: enabledRoutes()};
    parts.slice().sort((a, b) => (a.zIndex || 0) - (b.zIndex || 0))
      .forEach(shape => root.appendChild(drawShape(shape, ctx)));
  }
  draw();
  poll();
  setInterval(poll, 1000); //本家 useIntervalData 1.seconds
}

//================================================================ エディタ (TeConEdit.kt + TeConEditorViewComponent.kt)
const MODES = [
  {key:'HAND', label:'Hand (H)'},
  {key:'CURSOR', label:'Select (V)'},
  {key:'ERASER', label:'Eraser (E)'},
  {key:'RAIL', label:'Rail (R)', posCount:2},
  {key:'POLYLINE', label:'PolyLine (P)', posCount:Infinity},
  {key:'SIGNAL', label:'Signal (S)', posCount:1},
  {key:'TECON', label:'Lever (L)', posCount:1},
  {key:'FREETEXT', label:'Text (T)', posCount:1},
  {key:'ROUTE', label:'Route (;)', posCount:1},
  {key:'RECT', label:'Station', posCount:2},
  {key:'TRAIN_NUMBER', label:'TrainNo (N)', posCount:2},
];
function createShape(modeKey, list){
  const first = list[0];
  const rel = p => ({x: p.x - first.x, y: p.y - first.y});
  switch (modeKey) {
    case 'RAIL': return {type:'RailLine', pos:first, start:{x:0,y:0}, end:rel(list[1]), railGroupList:[], zIndex:0};
    case 'POLYLINE': return {type:'RailPolyLine', pos:first, points:list.map(rel), railGroupList:[], zIndex:0};
    case 'SIGNAL': return {type:'Signal', pos:first, signalPos:{x:0,y:0,z:0}, rotation:null, zIndex:0};
    case 'TECON': return {type:'TeConLever', pos:first, id:`lever-${first.x}-${first.y}`, name:'', rotation:0,
                          left:{kind:'disabled'}, right:{kind:'disabled'}, zIndex:0};
    case 'FREETEXT': return {type:'FreeText', pos:first, text:'FreeText', size:12, color:'white', anchor:'start', zIndex:0};
    case 'ROUTE': return {type:'Route', pos:first, id:`route-${first.x}-${first.y}`, name:'', zIndex:0};
    case 'RECT': return {type:'RectBox', pos:first, start:{x:0,y:0}, end:rel(list[1]), zIndex:0};
    case 'TRAIN_NUMBER': return {type:'TrainNumber', pos:first, start:{x:0,y:0}, end:rel(list[1]),
                                 railGroupList:[], size:24, anchor:'middle', zIndex:0};
    default: return null;
  }
}

async function renderEditor(uuid){
  const res = await fetch(`/api/tecons/${uuid}`);
  if (!res.ok) { location.href = '/p/tecons'; return; }
  const tecon = await res.json();
  document.getElementById('headtitle').textContent = `Edit: ${tecon.name}`;
  let name = tecon.name;
  let parts = tecon.parts || [];
  let mode = 'HAND';
  let selectedPosList = [];
  let selectedIndex = -1;
  let dotVisible = true;
  let mousePos = {x:0, y:0};

  page.innerHTML = `
    <div id="topmap">
      <svg id="mapsvg" xmlns="http://www.w3.org/2000/svg"><g id="maproot">
        <g id="grails" stroke="white"></g>
      </g></svg>
      <div id="rgpanel"><div id="rgpaper"></div></div>
    </div>
    <div id="board">
      <svg id="teconsvg" xmlns="http://www.w3.org/2000/svg"><g id="troot"></g></svg>
      <div id="sidepanel">
        <div class="card" id="settingsCard"></div>
        <div class="card" id="propCard" style="display:none"></div>
      </div>
    </div>`;

  //-------- 上 1/3: 地図 + RailGroup リスト (RailGroup UUID の調査用)
  const mapsvg = document.getElementById('mapsvg');
  const maproot = document.getElementById('maproot');
  const mapPz = makePanzoom(mapsvg, maproot, {});
  let railList = [], railGroups = [];
  let selectedRailKey = null, activeRG = null;
  const posKey = p => `${p.x},${p.y},${p.z}`;
  function renderMapRails(){
    const g = document.getElementById('grails');
    g.textContent = '';
    for (const rail of railList){
      const gr = document.createElementNS(SVGNS, 'g');
      const key = posKey(rail.pos);
      if (activeRG && activeRG.railPosList.some(p => posKey(p) === key)) gr.setAttribute('stroke', 'orange');
      else if (rail.isTrainOnRail) gr.setAttribute('stroke', 'red');
      gr.style.cursor = 'pointer';
      gr.addEventListener('click', () => {
        if (mapPz.moved > 4) return;
        if (selectedRailKey === key) { selectedRailKey = null; activeRG = null; }
        else {
          selectedRailKey = key;
          const owners = railGroups.filter(rg => rg.railPosList.some(p => posKey(p) === key));
          activeRG = owners.length === 1 ? owners[0] : null;
        }
        renderMapRails(); renderRGList();
      });
      for (const rm of rail.railMaps){
        el('line', {x1: rm.startRP.posX, y1: rm.startRP.posZ, x2: rm.endRP.posX, y2: rm.endRP.posZ,
          'stroke-width':3, 'stroke-opacity':0}, gr);
        el('line', {x1: rm.startRP.posX, y1: rm.startRP.posZ, x2: rm.endRP.posX, y2: rm.endRP.posZ}, gr);
      }
      g.appendChild(gr);
    }
  }
  function renderRGList(){
    const paper = document.getElementById('rgpaper');
    paper.textContent = '';
    railGroups
      .filter(rg => !selectedRailKey || rg.railPosList.some(p => posKey(p) === selectedRailKey))
      .sort((a, b) => a.name.localeCompare(b.name))
      .forEach(rg => {
        const item = document.createElement('div');
        item.className = 'rg-item' + (activeRG && activeRG.uuid === rg.uuid ? ' active' : '');
        item.innerHTML = `<span>${esc(rg.name)} <small>(${rg.railPosList.length})</small></span>`;
        const copy = document.createElement('button');
        copy.className = 'icon-btn'; copy.innerHTML = svgIcon('copy'); copy.title = 'UUIDをコピー';
        copy.onclick = e => { e.stopPropagation(); navigator.clipboard.writeText(rg.uuid); };
        item.appendChild(copy);
        item.onclick = () => { activeRG = rg; renderMapRails(); renderRGList(); };
        paper.appendChild(item);
      });
  }

  //-------- 下: 盤面エディタ
  const tsvg = document.getElementById('teconsvg');
  const troot = document.getElementById('troot');
  const pz = makePanzoom(tsvg, troot, {
    onTransform(tx, ty, scale){ dotBackground(tsvg, tx, ty, scale, dotVisible); }
  });
  dotBackground(tsvg, 0, 0, 1, dotVisible);

  tsvg.addEventListener('mousemove', e => {
    const w = pz.toWorld(e.clientX, e.clientY);
    mousePos = {x: snap(w.x), y: snap(w.y)};
    if (modeInfo().posCount) drawBoard();
  });
  tsvg.addEventListener('click', e => {
    const info = modeInfo();
    if (!info.posCount) return;
    if (pz.moved > 4) return;
    const isInf = info.posCount === Infinity;
    const same = p => p.x === mousePos.x && p.y === mousePos.y;
    let list;
    if (selectedPosList.some(same) && !isInf) list = selectedPosList.filter(p => !same(p));
    else list = [...selectedPosList, {...mousePos}];
    const fin = isInf && selectedPosList.length && same(selectedPosList[selectedPosList.length - 1]);
    if (fin) list = list.slice(0, -1);
    if (list.length === info.posCount || fin) {
      const shape = createShape(mode, list);
      if (shape) parts = [...parts, shape];
      list = [];
    }
    selectedPosList = list;
    drawBoard();
  });

  function modeInfo(){ return MODES.find(m2 => m2.key === mode) || {}; }
  function setMode(key){
    mode = key;
    selectedPosList = [];
    if (key === 'HAND') pz.resume(); else pz.pause();
    renderSettings(); drawBoard();
  }
  window.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
    const k = e.key.toUpperCase();
    const map = {H:'HAND', V:'CURSOR', E:'ERASER', R:'RAIL', P:'POLYLINE', S:'SIGNAL', L:'TECON', T:'FREETEXT', ';':'ROUTE', N:'TRAIN_NUMBER'};
    if (map[k] || map[e.key]) setMode(map[k] || map[e.key]);
  });

  function drawBoard(){
    troot.textContent = '';
    const ctx = {rgStates: {}, signalLevels: {}, runtime: null, armed: null, editor: true};
    parts.slice().sort((a, b) => (a.zIndex || 0) - (b.zIndex || 0)).forEach(shape => {
      const index = parts.indexOf(shape);
      const g = drawShape(shape, {...ctx, editorSelected: index === selectedIndex});
      if (mode === 'CURSOR' || mode === 'ERASER') {
        g.style.cursor = 'pointer';
        g.addEventListener('click', e => {
          e.stopPropagation();
          if (mode === 'ERASER') { parts = parts.filter((_, i) => i !== index); selectedIndex = -1; }
          else selectedIndex = selectedIndex === index ? -1 : index;
          drawBoard(); renderProp();
        });
      }
      troot.appendChild(g);
    });
    //作成プレビュー (本家 createPreviewElement)
    const info = modeInfo();
    if (info.posCount && selectedPosList.length) {
      const preview = createShape(mode, [...selectedPosList, mousePos]);
      if (preview) {
        const g = drawShape(preview, {rgStates:{}, signalLevels:{}, editor:true});
        g.setAttribute('opacity', '0.5');
        troot.appendChild(g);
      }
    }
    //カーソル位置 (本家 CircleMousePos)
    if (info.posCount) {
      el('circle', {cx: mousePos.x, cy: mousePos.y, r: 4, fill: 'white', 'fill-opacity': .6}, troot);
    }
  }

  //-------- 右上: Editor カード
  function renderSettings(){
    const card = document.getElementById('settingsCard');
    card.innerHTML = `<b style="font-size:larger">Editor</b><br>`;
    const nameInput = document.createElement('input');
    nameInput.type = 'text'; nameInput.value = name; nameInput.style.width = '100%'; nameInput.style.margin = '8px 0';
    nameInput.oninput = () => name = nameInput.value;
    card.appendChild(nameInput);
    const tools = document.createElement('div');
    tools.style.cssText = 'display:flex;gap:4px;margin-bottom:8px';
    const mkBtn = (icon, title, onclick) => {
      const b = document.createElement('button');
      b.className = 'btn outlined'; b.innerHTML = svgIcon(icon); b.title = title; b.onclick = onclick;
      tools.appendChild(b);
    };
    mkBtn('home', 'ホーム', () => pz.home());
    mkBtn('add', 'ズームイン', () => pz.zoom(1.25));
    mkBtn('remove', 'ズームアウト', () => pz.zoom(0.8));
    mkBtn('dots', 'ドット表示切替', () => { dotVisible = !dotVisible; dotBackground(tsvg, pz.tx, pz.ty, pz.scale, dotVisible); });
    mkBtn('download', 'JSONダウンロード', () => {
      const data = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify({uuid, name, parts}));
      const link = document.createElement('a');
      link.setAttribute('href', data);
      link.setAttribute('download', `${name}.json`);
      link.click();
    });
    card.appendChild(tools);
    const modes = document.createElement('div');
    modes.className = 'modes';
    MODES.forEach(m2 => {
      const b = document.createElement('button');
      b.textContent = m2.label;
      if (m2.key === mode) b.classList.add('on');
      b.onclick = () => setMode(m2.key);
      modes.appendChild(b);
    });
    card.appendChild(modes);
    const actions = document.createElement('div');
    actions.style.cssText = 'display:flex;justify-content:space-between;margin-top:12px';
    const save = document.createElement('button');
    save.className = 'btn'; save.textContent = '保存';
    save.onclick = async () => {
      save.disabled = true;
      await fetch(`/api/tecons/${uuid}`, {method:'PUT', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({uuid, name, parts})});
      save.disabled = false;
      document.getElementById('headtitle').textContent = `Edit: ${name}`;
    };
    const del = document.createElement('button');
    del.className = 'btn danger'; del.textContent = '削除';
    del.onclick = async () => {
      if (!confirm(`TeCon: ${name} を削除しますか？`)) return;
      await fetch(`/api/tecons/${uuid}`, {method:'DELETE'});
      location.href = '/p/tecons';
    };
    actions.appendChild(save); actions.appendChild(del);
    card.appendChild(actions);
  }

  //-------- 右下: プロパティ (EditMode.createPropertyElement 相当)
  function updateShape(newShape){
    parts = parts.map((p, i) => i === selectedIndex ? newShape : p);
    drawBoard(); renderProp();
  }
  function renderProp(){
    const card = document.getElementById('propCard');
    const shape = parts[selectedIndex];
    if (!shape) { card.style.display = 'none'; return; }
    card.style.display = 'block';
    card.innerHTML = `<b style="font-size:larger">${shape.type}</b>`;
    const routes = parts.filter(p => p.type === 'Route');

    const addText = (label, value, onchange, parent = card) => {
      const l = document.createElement('label'); l.className = 'small'; l.textContent = label;
      parent.appendChild(l);
      const input = document.createElement('input');
      input.type = 'text'; input.value = value ?? ''; input.style.width = '100%';
      input.oninput = () => onchange(input.value);
      parent.appendChild(input);
    };
    const addNumber = (label, value, onchange, parent = card) => {
      const l = document.createElement('label'); l.className = 'small'; l.textContent = label;
      parent.appendChild(l);
      const input = document.createElement('input');
      input.type = 'number'; input.value = value ?? 0; input.style.width = '100%';
      input.oninput = () => onchange(parseInt(input.value) || 0);
      parent.appendChild(input);
    };
    const addUuidList = (label, list, onchange, parent = card) => {
      const l = document.createElement('label'); l.className = 'small'; l.textContent = label;
      parent.appendChild(l);
      (list || []).forEach((u, i) => {
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;gap:4px;margin:2px 0';
        const input = document.createElement('input');
        input.type = 'text'; input.value = u; input.style.flex = '1';
        input.oninput = () => { const c = [...list]; c[i] = input.value; onchange(c); };
        row.appendChild(input);
        const delBtn = document.createElement('button');
        delBtn.className = 'icon-btn'; delBtn.innerHTML = svgIcon('delete');
        delBtn.onclick = () => onchange(list.filter((_, j) => j !== i));
        row.appendChild(delBtn);
        parent.appendChild(row);
      });
      const add = document.createElement('button');
      add.className = 'btn outlined'; add.textContent = 'Add';
      add.onclick = () => onchange([...(list || []), '']);
      parent.appendChild(add);
    };
    const addPosList = (label, list, onchange, parent = card) => {
      const l = document.createElement('label'); l.className = 'small'; l.textContent = label;
      parent.appendChild(l);
      (list || []).forEach((p, i) => {
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;gap:4px;margin:2px 0';
        ['x','y','z'].forEach(axis => {
          const input = document.createElement('input');
          input.type = 'number'; input.value = p[axis] ?? 0; input.style.width = '30%'; input.placeholder = axis;
          input.oninput = () => { const c = list.map(o => ({...o})); c[i][axis] = parseInt(input.value) || 0; onchange(c); };
          row.appendChild(input);
        });
        const delBtn = document.createElement('button');
        delBtn.className = 'icon-btn'; delBtn.innerHTML = svgIcon('delete');
        delBtn.onclick = () => onchange(list.filter((_, j) => j !== i));
        row.appendChild(delBtn);
        parent.appendChild(row);
      });
      const add = document.createElement('button');
      add.className = 'btn outlined'; add.textContent = 'Add';
      add.onclick = () => onchange([...(list || []), {x:0,y:0,z:0}]);
      parent.appendChild(add);
    };

    switch (shape.type) {
      case 'RailLine':
      case 'RailPolyLine':
        addUuidList('RailGroups (UUID)', shape.railGroupList, v => updateShape({...shape, railGroupList: v}));
        break;
      case 'TrainNumber':
        addUuidList('RailGroups (UUID)', shape.railGroupList, v => updateShape({...shape, railGroupList: v}));
        addNumber('Font Size', shape.size, v => updateShape({...shape, size: v}));
        break;
      case 'Signal': {
        const sp = shape.signalPos || {x:0,y:0,z:0};
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;gap:4px;margin:6px 0';
        ['x','y','z'].forEach(axis => {
          const input = document.createElement('input');
          input.type = 'number'; input.value = sp[axis]; input.style.width = '30%'; input.placeholder = axis;
          input.oninput = () => updateShape({...shape, signalPos: {...sp, [axis]: parseInt(input.value) || 0}});
          row.appendChild(input);
        });
        card.appendChild(row);
        const baseline = document.createElement('label');
        baseline.innerHTML = `<input type="checkbox" ${shape.rotation != null ? 'checked' : ''}> Show Baseline`;
        baseline.querySelector('input').onchange = e2 =>
          updateShape({...shape, rotation: e2.target.checked ? 0 : null});
        card.appendChild(baseline);
        if (shape.rotation != null) addNumber('Rotation (0-360)', shape.rotation, v => updateShape({...shape, rotation: Math.max(0, Math.min(360, v))}));
        break;
      }
      case 'FreeText': {
        addText('Text', shape.text, v => updateShape({...shape, text: v}));
        const sel = document.createElement('select');
        [['start','Left'],['middle','Center'],['end','Right']].forEach(([v, t]) => sel.appendChild(new Option(t, v)));
        sel.value = shape.anchor || 'start';
        sel.onchange = () => updateShape({...shape, anchor: sel.value});
        card.appendChild(sel);
        addNumber('Font Size', shape.size, v => updateShape({...shape, size: v}));
        addText('Color', shape.color, v => updateShape({...shape, color: v}));
        break;
      }
      case 'Route':
        addText('ID', shape.id, v => updateShape({...shape, id: v}));
        addText('Name', shape.name, v => updateShape({...shape, name: v}));
        break;
      case 'TeConLever': {
        addText('ID', shape.id, v => updateShape({...shape, id: v}));
        addText('Name', shape.name, v => updateShape({...shape, name: v}));
        addNumber('Rotation', shape.rotation, v => updateShape({...shape, rotation: v}));
        for (const sideName of ['left', 'right']) {
          const config = shape[sideName] || {kind:'disabled'};
          const box = document.createElement('div');
          box.className = 'oprow';
          box.innerHTML = `<b>${sideName === 'left' ? 'L' : 'R'} side</b> `;
          const kindSel = document.createElement('select');
          [['disabled','無効'],['direct','Direct'],['select','Select (進路選択)']].forEach(([v, t]) => kindSel.appendChild(new Option(t, v)));
          kindSel.value = config.kind || 'disabled';
          kindSel.onchange = () => {
            const kind = kindSel.value;
            const next = kind === 'direct' ? {kind, action: emptyAction(null)}
                       : kind === 'select' ? {kind, actions: []}
                       : {kind};
            updateShape({...shape, [sideName]: next});
          };
          box.appendChild(kindSel);
          if (config.kind === 'direct') {
            box.appendChild(actionEditor(config.action || emptyAction(null), false, a =>
              updateShape({...shape, [sideName]: {kind:'direct', action: a}})));
          } else if (config.kind === 'select') {
            (config.actions || []).forEach((a, ai) => {
              const wrap = actionEditor(a, true, next => {
                const actions = [...config.actions]; actions[ai] = next;
                updateShape({...shape, [sideName]: {kind:'select', actions}});
              }, () => {
                const actions = config.actions.filter((_, j) => j !== ai);
                updateShape({...shape, [sideName]: {kind:'select', actions}});
              });
              box.appendChild(wrap);
            });
            const addAct = document.createElement('button');
            addAct.className = 'btn outlined'; addAct.textContent = 'Add Action';
            addAct.onclick = () => updateShape({...shape, [sideName]:
              {kind:'select', actions: [...(config.actions || []), emptyAction(routes[0] ? routes[0].id : '')]}});
            box.appendChild(addAct);
          }
          card.appendChild(box);
        }
        break;
      }
    }

    function emptyAction(routeId){
      return {routeId, name:'Action', requireNoTrainToCancel:false, operations:[]};
    }
    //本家 TeConActionEditor + OperationListEditor
    function actionEditor(action, allowRoute, onChange, onDelete){
      const wrap = document.createElement('div');
      wrap.className = 'oprow';
      const head = document.createElement('div');
      head.style.cssText = 'display:flex;justify-content:space-between;align-items:center';
      head.innerHTML = '<b>Action</b>';
      if (onDelete) {
        const delBtn = document.createElement('button');
        delBtn.className = 'icon-btn'; delBtn.innerHTML = svgIcon('delete');
        delBtn.onclick = onDelete;
        head.appendChild(delBtn);
      }
      wrap.appendChild(head);
      if (allowRoute) {
        const sel = document.createElement('select');
        sel.style.width = '100%';
        routes.forEach(r => sel.appendChild(new Option(r.name ? `${r.name} (${r.id})` : r.id, r.id)));
        sel.value = action.routeId || '';
        sel.onchange = () => onChange({...action, routeId: sel.value});
        wrap.appendChild(sel);
      }
      addText('Action Name', action.name, v => onChange({...action, name: v}), wrap);
      const cancel = document.createElement('label');
      cancel.innerHTML = `<input type="checkbox" ${action.requireNoTrainToCancel ? 'checked' : ''}> 在線中は復位できないようにする`;
      cancel.querySelector('input').onchange = e2 => onChange({...action, requireNoTrainToCancel: e2.target.checked});
      wrap.appendChild(cancel);
      //operations
      (action.operations || []).forEach((op, oi) => {
        const opBox = document.createElement('div');
        opBox.className = 'oprow';
        const opHead = document.createElement('div');
        opHead.style.cssText = 'display:flex;justify-content:space-between';
        opHead.innerHTML = `<b>${op.type}</b>`;
        const delOp = document.createElement('button');
        delOp.className = 'icon-btn'; delOp.innerHTML = svgIcon('delete');
        delOp.onclick = () => onChange({...action, operations: action.operations.filter((_, j) => j !== oi)});
        opHead.appendChild(delOp);
        opBox.appendChild(opHead);
        const setOp = next => {
          const operations = [...action.operations]; operations[oi] = next;
          onChange({...action, operations});
        };
        if (op.type === 'Reserve') {
          addUuidList('RailGroup Chain (進路順)', (op.chain || {}).chain || [], v =>
            setOp({...op, chain: {chain: v, key: (op.chain || {}).key || ''}}), opBox);
          addText('Key (省略可)', op.key, v => setOp({...op, key: v}), opBox);
          addPosList('Reserved RS Pos', op.reservedRedStonePosSet, v => setOp({...op, reservedRedStonePosSet: v}), opBox);
          addPosList('Locked RS Pos', op.lockedRedStonePosSet, v => setOp({...op, lockedRedStonePosSet: v}), opBox);
        } else if (op.type === 'RedStone') {
          addPosList('RS Pos', op.redStonePosSet, v => setOp({...op, redStonePosSet: v}), opBox);
        } else if (op.type === 'JavaScript') {
          addText('Script', op.script, v => setOp({...op, script: v}), opBox);
        }
        wrap.appendChild(opBox);
      });
      const opSel = document.createElement('select');
      [['Reserve','Reserve (進路予約)'],['RedStone','RedStone'],['JavaScript','JavaScript']]
        .forEach(([v, t]) => opSel.appendChild(new Option(t, v)));
      wrap.appendChild(opSel);
      const addOp = document.createElement('button');
      addOp.className = 'btn outlined'; addOp.textContent = '+ Operation';
      addOp.onclick = () => {
        const type = opSel.value;
        const op = type === 'Reserve'
          ? {type, chain:{chain:[], key:''}, key:'', reservedRedStonePosSet:[], lockedRedStonePosSet:[]}
          : type === 'RedStone' ? {type, redStonePosSet:[]}
          : {type, script:'true'};
        onChange({...action, operations: [...(action.operations || []), op]});
      };
      wrap.appendChild(addOp);
      return wrap;
    }
  }

  renderSettings();
  drawBoard();
  renderProp();

  //地図データ読み込み
  try {
    [railList, railGroups] = await Promise.all([
      fetch('/api/rails').then(r => r.json()),
      fetch('/api/railgroups').then(r => r.json())
    ]);
    renderMapRails(); renderRGList();
  } catch (e) {}
}
</script>
</body>
</html>
