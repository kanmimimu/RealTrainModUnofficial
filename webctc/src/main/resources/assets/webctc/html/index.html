<!doctype html>
<!--
  本家 WebCTC フロント (front/src/jsMain/kotlin/pages/MapView.kt ほか, Kotlin/JS + React + MUI) の
  忠実レプリカ。レイアウト・配色・描画ジオメトリは本家コンポーネントの値をそのまま使用:
    - Header: AppBar sticky #3d3d3d, 白角丸ロゴ (HeaderComponent.kt の SVG パス)
    - 地図: svg background darkslategray, レール=白直線 (在線=赤), 信号=WSignalGroup の座標式,
      編成=6x6 黄矩形 (ドア開=lightgray) + "速度km/h 名前 運転士" (8px bold white)
    - 右: 30vw の半透明 Paper に編成リスト (クリックで追尾)
    - 更新間隔: signals/formations 3 秒 (本家 interval = 3.seconds)
-->
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WebCTC</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:'Noto Sans JP',sans-serif;display:flex;flex-direction:column;height:100vh;overflow:hidden}
  /* Header (MUI AppBar #3d3d3d) */
  header{position:sticky;top:0;background:#3d3d3d;display:flex;align-items:center;justify-content:space-between;
         padding:8px 24px;box-shadow:0 2px 4px -1px rgba(0,0,0,.2),0 4px 5px 0 rgba(0,0,0,.14);z-index:10}
  .logo-btn{background:none;border:none;padding:8px;cursor:pointer}
  .logo{height:50px;padding:5px 15px;background:white;border-radius:10px;display:block}
  .account-btn{background:none;border:none;color:white;cursor:pointer;padding:12px}
  .account-btn svg{width:28px;height:28px;fill:currentColor}
  /* Map + panel (MapView.kt) */
  #main{flex:1;display:flex;flex-direction:row-reverse;position:relative;min-height:0}
  #mapsvg{flex:1;background:darkslategray;touch-action:none;cursor:grab}
  #mapsvg.drag{cursor:grabbing}
  #panel{position:absolute;right:0;top:0;width:30vw;height:100%;border-radius:16px;padding:16px;pointer-events:none}
  #paper{background:rgba(255,255,255,0.4);height:100%;overflow:auto;border-radius:4px;
         box-shadow:0 2px 1px -1px rgba(0,0,0,.2),0 1px 1px 0 rgba(0,0,0,.14);pointer-events:auto}
  ul#flist{list-style:none;margin:0;padding:0}
  ul#flist li{padding:8px 16px;cursor:pointer;border-bottom:1px solid rgba(0,0,0,.12);font-size:14px}
  ul#flist li:hover{background:rgba(0,0,0,.04)}
  ul#flist li.selected{background:rgba(25,118,210,.18)}
  ul#flist li .sub{font-size:12px;color:#333;opacity:.75}
</style>
</head>

<script>
"use strict";
const SVGNS = "http://www.w3.org/2000/svg";
const interval = 3000; //本家 interval = 3.seconds

let railList = [], signalList = [], formationList = [], waypointList = [];
let targetingFormationId = null;
let centeredOnce = false;

//---------------- panzoom (本家は panzoom ライブラリ。挙動を再現: ドラッグ移動 + カーソル中心ホイールズーム) ----------------
const mtx = document.getElementById('mtx');
const svg = document.getElementById('mapsvg');
let tx = 0, ty = 0, scale = 1;
function applyTransform(){ mtx.setAttribute('transform', `translate(${tx} ${ty}) scale(${scale})`); }
let dragging = false, lastX = 0, lastY = 0;
svg.addEventListener('pointerdown', e => { dragging = true; lastX = e.clientX; lastY = e.clientY; svg.classList.add('drag'); svg.setPointerCapture(e.pointerId); });
svg.addEventListener('pointermove', e => {
  if (!dragging) return;
  tx += e.clientX - lastX; ty += e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  applyTransform();
});
svg.addEventListener('pointerup', () => { dragging = false; svg.classList.remove('drag'); });
svg.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = svg.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const factor = e.deltaY < 0 ? 1.25 : 0.8;
  const ns = Math.max(0.05, Math.min(64, scale * factor));
  tx = mx - (mx - tx) * (ns / scale);
  ty = my - (my - ty) * (ns / scale);
  scale = ns;
  applyTransform();
  renderWaypoints(); //ラベルはズームに関わらず一定サイズ (本家 scale(2/scale))
}, { passive: false });
//本家 panzoom.smoothMoveTo 相当
function smoothMoveTo(nx, ny){
  const sx = tx, sy = ty, t0 = performance.now(), dur = 400;
  function step(t){
    const p = Math.min(1, (t - t0) / dur), e = 1 - Math.pow(1 - p, 3);
    tx = sx + (nx - sx) * e; ty = sy + (ny - sy) * e;
    applyTransform();
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
function centerOn(x, z){
  const rect = svg.getBoundingClientRect();
  smoothMoveTo(-x * scale + rect.width / 2, -z * scale + rect.height / 2);
}

//---------------- WRail (Rail.kt): railMap ごとの直線。在線 = 赤、非開通 = 灰 ----------------
function renderRails(){
  const g = document.getElementById('grails');
  g.textContent = '';
  for (const rail of railList){
    const gr = document.createElementNS(SVGNS, 'g');
    if (rail.isTrainOnRail) gr.setAttribute('stroke', 'red');
    for (const rm of rail.railMaps){
      const line = document.createElementNS(SVGNS, 'line');
      line.setAttribute('x1', rm.startRP.posX); line.setAttribute('y1', rm.startRP.posZ);
      line.setAttribute('x2', rm.endRP.posX);   line.setAttribute('y2', rm.endRP.posZ);
      if (rm.isNotActive) line.setAttribute('stroke', 'gray');
      gr.appendChild(line);
    }
    g.appendChild(gr);
  }
}

//---------------- WSignalGroup (Signal.kt): ジオメトリ式は本家のまま ----------------
function getSignalColor(level){
  switch(level){
    case 0: return 'darkslategray';
    case 1: return 'rgb(2045,0,0)';
    case 2: return 'rgb(255,153,0)';
    case 3: return 'rgb(255,204,0)';
    case 4: return 'rgb(155,255,0)';
    case 5: return 'rgb(51,204,0)';
    default: return 'rgb(51,102,255)';
  }
}
function renderSignals(){
  const g = document.getElementById('gsignals');
  g.textContent = '';
  //本家: "x,z-rotation" でグループ化
  const groups = new Map();
  for (const s of signalList){
    const key = `${s.pos.x},${s.pos.z}-${s.rotation}`;
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(s);
  }
  for (const signals of groups.values()){
    const sorted = signals.slice().sort((a, b) => a.pos.y - b.pos.y);
    const base = sorted[0];
    const rotation = base.rotation;
    const cos = Math.cos((270 + rotation) * (Math.PI / 180));
    const sin = Math.sin((270 + rotation) * (Math.PI / 180));
    const bx = base.pos.x, bz = base.pos.z;
    const n = sorted.length;

    const l1 = document.createElementNS(SVGNS, 'line');
    l1.setAttribute('x1', bx - (n - 1) * 3.5 * cos); l1.setAttribute('y1', bz + (n - 1) * 3.5 * sin);
    l1.setAttribute('x2', bx + 4.0 * cos);           l1.setAttribute('y2', bz - 4.0 * sin);
    g.appendChild(l1);
    const l2 = document.createElementNS(SVGNS, 'line');
    l2.setAttribute('x1', bx + 4.0 * cos + 1.5 * sin); l2.setAttribute('y1', bz + 1.5 * cos - 4.0 * sin);
    l2.setAttribute('x2', bx + 4.0 * cos - 1.5 * sin); l2.setAttribute('y2', bz - 1.5 * cos - 4.0 * sin);
    g.appendChild(l2);

    sorted.forEach((signal, index) => {
      const blockDirectionRotation = signal.blockDirection * 90;
      const diff = (rotation - blockDirectionRotation + 360) % 360;
      const isLeft = diff < 180 && diff !== 0 && n > 1;
      const isRight = diff > 180 && diff !== 0 && n > 1;
      const offsetCx = ((isLeft ? 3.0 : isRight ? -3.0 : 0.0)) * sin + (-index * 3.5 - (isLeft || isRight ? 1.0 : 0.0)) * cos;
      const offsetCy = (isLeft ? 3.0 : isRight ? -3.0 : 0.0) * cos + (index * 3.5 + (isLeft || isRight ? 1.0 : 0.0)) * sin;
      const cx = signal.pos.x + offsetCx, cy = signal.pos.z + offsetCy;
      if (isLeft || isRight){
        const pl = document.createElementNS(SVGNS, 'polyline');
        pl.setAttribute('fill', 'none');
        pl.setAttribute('points', [
          `${cx},${cy}`,
          `${cx + 3.0 * cos},${cy - 3.0 * sin}`,
          `${cx + 3.0 * cos - (isLeft ? 3.0 : -3.0) * sin},${cy - 3.0 * sin - (isLeft ? 3.0 : -3.0) * cos}`
        ].join(' '));
        g.appendChild(pl);
      }
      const c = document.createElementNS(SVGNS, 'circle');
      c.setAttribute('cx', cx); c.setAttribute('cy', cy); c.setAttribute('r', 1.5);
      c.setAttribute('fill', getSignalColor(signal.signalLevel));
      c.setAttribute('stroke', 'none');
      g.appendChild(c);
    });
  }
}

//---------------- WFormation (Formation.kt) ----------------
function renderFormations(){
  const g = document.getElementById('gformations');
  g.textContent = '';
  for (const formation of formationList){
    const controlCar = formation.controlCar;
    if (!controlCar) continue;
    const posX = controlCar.pos.x, posZ = controlCar.pos.z;
    const doorState = controlCar.trainStateData[4] !== 0;

    const rect = document.createElementNS(SVGNS, 'rect');
    rect.setAttribute('x', posX - 3); rect.setAttribute('y', posZ - 3);
    rect.setAttribute('width', 6); rect.setAttribute('height', 6);
    rect.setAttribute('fill', doorState ? 'lightgray' : 'yellow');
    rect.setAttribute('stroke', 'gray');
    g.appendChild(rect);

    const speed = Math.round(controlCar.speed * 72);
    const name = controlCar.name === 'no_name' ? '' : controlCar.name;
    const driver = controlCar.driver;
    const text = document.createElementNS(SVGNS, 'text');
    text.textContent = `${speed}km/h ${name} ${driver}`;
    text.setAttribute('x', posX + 5); text.setAttribute('y', posZ + 3);
    text.setAttribute('font-size', 8); text.setAttribute('font-weight', 'bold');
    text.setAttribute('fill', 'white'); text.setAttribute('stroke', 'none');
    g.appendChild(text);
  }
}

//---------------- 編成リスト (WListFormation 相当) ----------------
function renderFormationList(){
  const ul = document.getElementById('flist');
  ul.textContent = '';
  for (const formation of formationList){
    const controlCar = formation.controlCar;
    if (!controlCar) continue;
    const li = document.createElement('li');
    if (formation.id === targetingFormationId) li.classList.add('selected');
    const speed = Math.round(controlCar.speed * 72);
    li.innerHTML = `<div>${controlCar.modelName}</div>`
      + `<div class="sub">ID: ${formation.id} / ${speed}km/h`
      + (controlCar.driver ? ` / ${controlCar.driver}` : '') + `</div>`;
    li.onclick = () => {
      targetingFormationId = targetingFormationId === formation.id ? null : formation.id;
      renderFormationList();
      followTarget();
    };
    ul.appendChild(li);
  }
}
//本家 useEffect(targetingFormation): 対象編成の制御車へスムーズ移動
function followTarget(){
  if (targetingFormationId == null) return;
  const f = formationList.find(f => f.id === targetingFormationId);
  const pos = f && f.controlCar && f.controlCar.pos;
  if (pos) centerOn(pos.x, pos.z);
}

//---------------- WWayPoint (WayPoint.kt): 範囲=黄色透過、ラベル=黒角丸+白太字 (ズームで一定サイズ) ----------------
function renderWaypoints(){
  const g = document.getElementById('gwaypoints');
  g.textContent = '';
  const labelScale = 2 / Math.min(scale, 4.0); //本家: scale = min(panzoom scale, 4.0)
  for (const wp of waypointList){
    const gw = document.createElementNS(SVGNS, 'g');
    gw.setAttribute('pointer-events', 'none');
    const range = wp.range || {};
    if (range.radius != null){ //CircleRange
      const c = document.createElementNS(SVGNS, 'circle');
      const center = range.center || wp.pos;
      c.setAttribute('cx', center.x); c.setAttribute('cy', center.z);
      c.setAttribute('r', range.radius);
      c.setAttribute('fill', 'yellow'); c.setAttribute('fill-opacity', '0.05');
      c.setAttribute('stroke', 'none');
      gw.appendChild(c);
    } else if (range.width != null){ //RectangleRange
      const r = document.createElementNS(SVGNS, 'rect');
      r.setAttribute('x', range.minX); r.setAttribute('y', range.minZ);
      r.setAttribute('width', range.width); r.setAttribute('height', range.height);
      r.setAttribute('fill', 'yellow'); r.setAttribute('fill-opacity', '0.05');
      r.setAttribute('stroke', 'none');
      gw.appendChild(r);
    }
    const name = wp.displayName || '';
    const gl = document.createElementNS(SVGNS, 'g');
    gl.setAttribute('transform', `translate(${wp.pos.x} ${wp.pos.z}) scale(${labelScale})`);
    const bg = document.createElementNS(SVGNS, 'rect');
    bg.setAttribute('x', -2 - 4 * name.length); bg.setAttribute('y', -8);
    bg.setAttribute('width', 8 * name.length + 4); bg.setAttribute('height', 10);
    bg.setAttribute('fill', 'black'); bg.setAttribute('fill-opacity', '0.8');
    bg.setAttribute('rx', 2); bg.setAttribute('ry', 2); bg.setAttribute('stroke', 'none');
    gl.appendChild(bg);
    const tx = document.createElementNS(SVGNS, 'text');
    tx.textContent = name;
    tx.setAttribute('fill', 'white'); tx.setAttribute('font-size', 8);
    tx.setAttribute('font-weight', 'bold'); tx.setAttribute('text-anchor', 'middle');
    tx.setAttribute('stroke', 'none');
    gl.appendChild(tx);
    gw.appendChild(gl);
    g.appendChild(gw);
  }
}

//---------------- WayPointEditor (/p/waypoint — 本家 WayPointEditor.kt) ----------------
const isWaypointEditor = location.pathname.replace(/\/$/, '') === '/p/waypoint';
function renderWaypointEditor(){
  if (!isWaypointEditor) return;
  document.getElementById('flist').style.display = 'none';
  const box = document.getElementById('wpEditor');
  box.style.display = 'block';
  box.innerHTML = '<div style="padding:10px 14px;font-weight:bold">ウェイポイント編集</div>';
  waypointList.forEach((wp, i) => {
    const d = document.createElement('div');
    d.style.cssText = 'border-top:1px solid rgba(0,0,0,.12);padding:8px 14px;font-size:13px';
    d.innerHTML = `
      <div style="font-weight:bold;margin-bottom:4px">${wp.identifyName || ('wp' + i)}</div>
      <label>表示名 <input data-k="displayName" value="${wp.displayName || ''}" style="width:120px"></label>
      <label> X <input data-k="x" value="${wp.pos ? wp.pos.x : 0}" style="width:60px"></label>
      <label> Z <input data-k="z" value="${wp.pos ? wp.pos.z : 0}" style="width:60px"></label>
      <label> 半径 <input data-k="r" value="${wp.range && wp.range.radius != null ? wp.range.radius : 100}" style="width:60px"></label>
      <button data-a="save">保存</button> <button data-a="del">削除</button> <button data-a="jump">表示</button>`;
    d.querySelectorAll('button').forEach(b => b.onclick = async () => {
      if (b.dataset.a === 'del'){ waypointList.splice(i, 1); }
      else if (b.dataset.a === 'jump'){ centerOn(wp.pos.x, wp.pos.z); return; }
      else {
        const get = k => d.querySelector(`input[data-k="${k}"]`).value;
        wp.displayName = get('displayName');
        wp.pos = { x: Number(get('x')) || 0, y: wp.pos ? wp.pos.y || 0 : 0, z: Number(get('z')) || 0 };
        wp.range = { center: wp.pos, radius: Number(get('r')) || 100 };
      }
      await saveWaypoints();
    });
    box.appendChild(d);
  });
  const add = document.createElement('div');
  add.style.cssText = 'padding:10px 14px;border-top:1px solid rgba(0,0,0,.12)';
  add.innerHTML = '<button id="wpAdd">＋ 新規ウェイポイント (地図中心)</button>';
  add.querySelector('#wpAdd').onclick = async () => {
    const rect = svg.getBoundingClientRect();
    const cx = (rect.width / 2 - tx) / scale, cz = (rect.height / 2 - ty) / scale;
    waypointList.push({
      identifyName: 'wp_' + Date.now(),
      displayName: 'WayPoint',
      pos: { x: Math.round(cx), y: 0, z: Math.round(cz) },
      range: { center: { x: Math.round(cx), y: 0, z: Math.round(cz) }, radius: 100 }
    });
    await saveWaypoints();
  };
  box.appendChild(add);
}
async function saveWaypoints(){
  try{
    await fetch('/api/waypoints', { method: 'POST', body: JSON.stringify(waypointList) });
  }catch(e){}
  renderWaypoints(); renderWaypointEditor();
}

//---------------- データ取得 (本家: rails は ws / signals・formations は 3 秒) ----------------
async function fetchRails(){
  try{
    railList = await fetch('/api/rails').then(r => r.json());
    renderRails();
    if (!centeredOnce && railList.length){
      centeredOnce = true;
      const rp = railList[0].railMaps[0].startRP;
      centerOn(rp.posX, rp.posZ);
    }
  }catch(e){}
}
async function fetchSignals(){
  try{ signalList = await fetch('/api/signals').then(r => r.json()); renderSignals(); }catch(e){}
}
async function fetchFormations(){
  try{
    formationList = await fetch('/api/formations').then(r => r.json());
    renderFormations(); renderFormationList(); followTarget();
  }catch(e){}
}
async function fetchWaypoints(){
  try{
    const data = await fetch('/api/waypoints').then(r => r.json());
    waypointList = Array.isArray(data) ? data : [];
    renderWaypoints(); renderWaypointEditor();
  }catch(e){}
}

fetchRails(); fetchSignals(); fetchFormations(); fetchWaypoints();
setInterval(fetchRails, 10000);          //本家は WebSocket 差分。ポーリングで代替
setInterval(fetchSignals, interval);     //3 秒 (本家 interval)
setInterval(fetchFormations, interval);  //3 秒 (本家 interval)
</script>
