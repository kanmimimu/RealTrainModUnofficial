<!doctype html>
<!--
  本家 WebCTC RailGroupManager (front/pages/RailGroupManager.kt + components/railgroup/*) の
  忠実レプリカ。3ペイン構成は本家のまま:
    左: 地図 (レールをクリックで選択、Shift で複数選択、選択=lightblue / RG所属=orange / hover=green)
    中: RailGroups (検索、Create RailGroup / Create Folder、フォルダツリー)
    右: Detail (Name / UUID / Folder / Rails / RedStone Pos / Display Pos / Next RailGroup / 転てつ設定 / 保存・削除)
-->
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WebCTC - RailGroup</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:'Noto Sans JP',sans-serif;display:flex;flex-direction:column;height:100vh;overflow:hidden}
  header{position:sticky;top:0;background:#3d3d3d;display:flex;align-items:center;justify-content:space-between;
         padding:8px 24px;box-shadow:0 2px 4px -1px rgba(0,0,0,.2),0 4px 5px 0 rgba(0,0,0,.14);z-index:10}
  .logo-btn{background:none;border:none;padding:8px;cursor:pointer}
  .logo{height:50px;padding:5px 15px;background:white;border-radius:10px;display:block}
  #main{flex:1;display:flex;min-height:0}
  #mapsvg{flex:1;background:darkslategray;touch-action:none;cursor:grab;min-width:0}
  #mapsvg.drag{cursor:grabbing}
  #mid{width:340px;background:whitesmoke;padding:0 16px 16px;display:flex;flex-direction:column;gap:8px;overflow:hidden}
  #right{width:25%;background:silver;padding:0 16px 16px;overflow-y:auto}
  h1{font-size:1.6em}
  input[type=text],input[type=number],select{padding:6px 8px;border:1px solid #aaa;border-radius:4px;font-size:13px}
  button{cursor:pointer;font-size:13px}
  .btn{background:#1976d2;color:white;border:none;border-radius:4px;padding:8px 14px;
       box-shadow:0 3px 1px -2px rgba(0,0,0,.2)}
  .btn:disabled{background:#9e9e9e}
  .btn.outlined{background:none;color:#1976d2;border:1px solid #1976d2;padding:4px 10px;box-shadow:none}
  .btn.danger{background:#d32f2f}
  .icon-btn{background:none;border:none;padding:2px 6px;font-size:14px;opacity:.7}
  .icon-btn:hover{opacity:1}
  #tree{flex:1;overflow-y:auto;background:white;border-radius:4px;
        box-shadow:0 2px 1px -1px rgba(0,0,0,.2),0 1px 1px 0 rgba(0,0,0,.14)}
  .rg-row,.folder-row{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;
        cursor:pointer;border-bottom:1px solid rgba(0,0,0,.08);font-size:13px}
  .rg-row:hover,.folder-row:hover{background:rgba(0,0,0,.04)}
  .rg-row.active{background:rgba(25,118,210,.18)}
  .rg-count{color:#666;font-size:12px;margin-left:8px}
  .folder-name{font-weight:bold}
  .indent{margin-left:16px;border-left:1px solid rgba(0,0,0,.1)}
  .box{margin-bottom:16px}
  .box .box-head{display:flex;justify-content:space-between;align-items:center;padding-bottom:8px;font-size:14px}
  .paper{background:white;border-radius:4px;box-shadow:0 2px 1px -1px rgba(0,0,0,.2),0 1px 1px 0 rgba(0,0,0,.14)}
  .row{display:flex;align-items:center;gap:4px;padding:4px 8px;border-bottom:1px solid rgba(0,0,0,.06);font-size:13px}
  .row input[type=number]{width:64px}
  .row input.key{flex:1;min-width:60px}
  .card{background:white;border-radius:4px;padding:8px;margin-bottom:8px;
        box-shadow:0 2px 1px -1px rgba(0,0,0,.2),0 1px 1px 0 rgba(0,0,0,.14)}
  .uuid{font-family:monospace;font-size:11px;word-break:break-all}
  label.small{font-size:12px;color:#444;display:block;margin-bottom:2px}
</style>
</head>

<script>
"use strict";
const SVGNS = "http://www.w3.org/2000/svg";
let railList = [], signalList = [], waypointList = [], railGroups = [], folders = [];
let selectedRails = new Set(); //"x,y,z"
let activeUUID = null;
let edit = null;              //編集中の RailGroup (deep copy)
let hoveringRail = null;
let shiftDown = false;
window.addEventListener('keydown', e => { if (e.key === 'Shift') shiftDown = true; });
window.addEventListener('keyup', e => { if (e.key === 'Shift') shiftDown = false; });

const posKey = p => `${p.x},${p.y},${p.z}`;

//---------------- SVG アイコン (本家は MUI icons — 絵文字は使わない) ----------------
const ICONS = {
  delete: 'M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z',
  edit: 'M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z',
  copy: 'M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z',
  folder: 'M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z',
  add: 'M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z',
};
function svgIcon(name, size = 16){
  return `<svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="currentColor" style="vertical-align:middle"><path d="${ICONS[name]}"/></svg>`;
}

//---------------- panzoom (index.html と同じ挙動) ----------------
const mtx = document.getElementById('mtx');
const svg = document.getElementById('mapsvg');
let tx = 0, ty = 0, scale = 1;
function applyTransform(){ mtx.setAttribute('transform', `translate(${tx} ${ty}) scale(${scale})`); }
let dragging = false, lastX = 0, lastY = 0, moved = 0;
svg.addEventListener('pointerdown', e => { dragging = true; moved = 0; lastX = e.clientX; lastY = e.clientY; svg.classList.add('drag'); svg.setPointerCapture(e.pointerId); });
svg.addEventListener('pointermove', e => {
  if (!dragging) return;
  moved += Math.abs(e.clientX - lastX) + Math.abs(e.clientY - lastY);
  tx += e.clientX - lastX; ty += e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  applyTransform();
});
svg.addEventListener('pointerup', () => { dragging = false; svg.classList.remove('drag'); });
svg.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = svg.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const factor = e.deltaY < 0 ? 1.25 : 0.8;
  const ns = Math.max(0.05, Math.min(64, scale * factor));
  tx = mx - (mx - tx) * (ns / scale);
  ty = my - (my - ty) * (ns / scale);
  scale = ns;
  applyTransform();
}, { passive: false });

//---------------- 地図描画 (WRailHover: クリック選択 + 色分け) ----------------
function railColor(rail){
  const key = posKey(rail.pos);
  if (hoveringRail === key) return 'green';                       //Detail hover (本家 Global styles)
  if (edit && edit.railPosList.some(p => posKey(p) === key)) return 'orange';
  if (selectedRails.has(key)) return 'lightblue';
  if (rail.isTrainOnRail) return 'red';
  return null; //グループ既定 (white)
}
function renderRails(){
  const g = document.getElementById('grails');
  g.textContent = '';
  for (const rail of railList){
    const gr = document.createElementNS(SVGNS, 'g');
    const color = railColor(rail);
    if (color) gr.setAttribute('stroke', color);
    gr.style.cursor = 'pointer';
    gr.addEventListener('click', () => {
      if (moved > 4) return; //ドラッグと区別
      const key = posKey(rail.pos);
      //本家 WRailHover.onClick の選択ロジック
      if (selectedRails.size === 1 && selectedRails.has(key)) {
        selectedRails.clear();
      } else {
        if (!shiftDown) selectedRails.clear();
        if (selectedRails.has(key)) selectedRails.delete(key); else selectedRails.add(key);
      }
      renderRails();
    });
    for (const rm of rail.railMaps){
      const line = document.createElementNS(SVGNS, 'line');
      line.setAttribute('x1', rm.startRP.posX); line.setAttribute('y1', rm.startRP.posZ);
      line.setAttribute('x2', rm.endRP.posX);   line.setAttribute('y2', rm.endRP.posZ);
      line.setAttribute('stroke-width', 3); //クリックしやすく (見た目は本家同様細く別線で上書き)
      line.setAttribute('stroke-opacity', 0);
      gr.appendChild(line);
      const vis = document.createElementNS(SVGNS, 'line');
      vis.setAttribute('x1', rm.startRP.posX); vis.setAttribute('y1', rm.startRP.posZ);
      vis.setAttribute('x2', rm.endRP.posX);   vis.setAttribute('y2', rm.endRP.posZ);
      if (rm.isNotActive && !color) vis.setAttribute('stroke', 'gray');
      gr.appendChild(vis);
    }
    g.appendChild(gr);
  }
}
function getSignalColor(level){
  switch(level){
    case 0: return 'darkslategray';
    case 1: return 'rgb(2045,0,0)';
    case 2: return 'rgb(255,153,0)';
    case 3: return 'rgb(255,204,0)';
    case 4: return 'rgb(155,255,0)';
    case 5: return 'rgb(51,204,0)';
    default: return 'rgb(51,102,255)';
  }
}
function renderSignals(){
  const g = document.getElementById('gsignals');
  g.textContent = '';
  //本家 WSignalGroup: "x,z-rotation" でグループ化し、柱 + 横線 + 現示円を描く
  const groups = new Map();
  for (const s of signalList){
    const key = `${s.pos.x},${s.pos.z}-${s.rotation}`;
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(s);
  }
  for (const signals of groups.values()){
    const sorted = signals.slice().sort((a, b) => a.pos.y - b.pos.y);
    const base = sorted[0];
    const rotation = base.rotation;
    const cos = Math.cos((270 + rotation) * (Math.PI / 180));
    const sin = Math.sin((270 + rotation) * (Math.PI / 180));
    const bx = base.pos.x, bz = base.pos.z;
    const n = sorted.length;

    const l1 = document.createElementNS(SVGNS, 'line');
    l1.setAttribute('x1', bx - (n - 1) * 3.5 * cos); l1.setAttribute('y1', bz + (n - 1) * 3.5 * sin);
    l1.setAttribute('x2', bx + 4.0 * cos);           l1.setAttribute('y2', bz - 4.0 * sin);
    g.appendChild(l1);
    const l2 = document.createElementNS(SVGNS, 'line');
    l2.setAttribute('x1', bx + 4.0 * cos + 1.5 * sin); l2.setAttribute('y1', bz + 1.5 * cos - 4.0 * sin);
    l2.setAttribute('x2', bx + 4.0 * cos - 1.5 * sin); l2.setAttribute('y2', bz - 1.5 * cos - 4.0 * sin);
    g.appendChild(l2);

    sorted.forEach((signal, index) => {
      const blockDirectionRotation = signal.blockDirection * 90;
      const diff = (rotation - blockDirectionRotation + 360) % 360;
      const isLeft = diff < 180 && diff !== 0 && n > 1;
      const isRight = diff > 180 && diff !== 0 && n > 1;
      const offsetCx = ((isLeft ? 3.0 : isRight ? -3.0 : 0.0)) * sin + (-index * 3.5 - (isLeft || isRight ? 1.0 : 0.0)) * cos;
      const offsetCy = (isLeft ? 3.0 : isRight ? -3.0 : 0.0) * cos + (index * 3.5 + (isLeft || isRight ? 1.0 : 0.0)) * sin;
      const cx = signal.pos.x + offsetCx, cy = signal.pos.z + offsetCy;
      if (isLeft || isRight){
        const pl = document.createElementNS(SVGNS, 'polyline');
        pl.setAttribute('fill', 'none');
        pl.setAttribute('points', [
          `${cx},${cy}`,
          `${cx + 3.0 * cos},${cy - 3.0 * sin}`,
          `${cx + 3.0 * cos - (isLeft ? 3.0 : -3.0) * sin},${cy - 3.0 * sin - (isLeft ? 3.0 : -3.0) * cos}`
        ].join(' '));
        g.appendChild(pl);
      }
      const c = document.createElementNS(SVGNS, 'circle');
      c.setAttribute('cx', cx); c.setAttribute('cy', cy); c.setAttribute('r', 1.5);
      c.setAttribute('fill', getSignalColor(signal.signalLevel));
      c.setAttribute('stroke', 'none');
      g.appendChild(c);
    });
  }
}

//---------------- ツリー (RailGroupTreeView 相当) ----------------
function renderTree(){
  const tree = document.getElementById('tree');
  tree.textContent = '';
  const search = document.getElementById('search').value.trim().toLowerCase();
  if (search) {
    railGroups.filter(rg => rg.name.toLowerCase().includes(search))
      .sort((a, b) => a.name.localeCompare(b.name))
      .forEach(rg => tree.appendChild(rgRow(rg)));
    return;
  }
  const renderLevel = (parentUuid, container) => {
    folders.filter(f => (f.parentUuid || null) === parentUuid)
      .sort((a, b) => a.name.localeCompare(b.name))
      .forEach(folder => {
        const row = document.createElement('div');
        row.className = 'folder-row';
        row.innerHTML = `<span class="folder-name">${svgIcon('folder')} ${escapeHtml(folder.name)}</span>`;
        const ops = document.createElement('span');
        ops.innerHTML = '';
        addIcon(ops, 'edit', 'リネーム', () => renameFolder(folder));
        addIcon(ops, 'add', 'サブフォルダ作成', () => createFolder(folder.uuid));
        addIcon(ops, 'delete', 'フォルダ削除', () => deleteFolder(folder));
        row.appendChild(ops);
        container.appendChild(row);
        const child = document.createElement('div');
        child.className = 'indent';
        container.appendChild(child);
        renderLevel(folder.uuid, child);
      });
    railGroups.filter(rg => (rg.folderUuid || null) === parentUuid)
      .sort((a, b) => a.name.localeCompare(b.name))
      .forEach(rg => container.appendChild(rgRow(rg)));
  };
  renderLevel(null, tree);
}
function rgRow(rg){
  const row = document.createElement('div');
  row.className = 'rg-row' + (rg.uuid === activeUUID ? ' active' : '');
  row.innerHTML = `<span>${escapeHtml(rg.name)}<span class="rg-count">${rg.railPosList.length}</span></span>`;
  row.onclick = () => { setActive(rg.uuid); };
  return row;
}
function addIcon(parent, icon, title, onclick){
  const b = document.createElement('button');
  b.className = 'icon-btn'; b.innerHTML = svgIcon(icon); b.title = title;
  b.onclick = e => { e.stopPropagation(); onclick(); };
  parent.appendChild(b);
}
function escapeHtml(s){ return (s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function setActive(uuid){
  activeUUID = uuid;
  const rg = railGroups.find(r => r.uuid === uuid);
  edit = rg ? JSON.parse(JSON.stringify(rg)) : null;
  hoveringRail = null;
  renderTree(); renderDetail(); renderRails();
}

//---------------- Detail (RailGroupDetailComponent 相当) ----------------
function renderDetail(){
  const root = document.getElementById('detail');
  root.textContent = '';
  if (!edit) return;
  const rg = edit;

  //Name
  root.appendChild(labeled('Name', textInput(rg.name, v => rg.name = v)));

  //UUID (コピー)
  const uuidBox = document.createElement('div');
  uuidBox.className = 'box';
  uuidBox.innerHTML = `<span class="uuid">${rg.uuid}</span>`;
  addIcon(uuidBox, 'copy', 'UUIDをコピー', () => navigator.clipboard.writeText(rg.uuid));
  root.appendChild(uuidBox);

  //Folder
  const folderSel = document.createElement('select');
  folderSel.appendChild(new Option('(なし)', ''));
  folders.forEach(f => folderSel.appendChild(new Option(f.name, f.uuid)));
  folderSel.value = rg.folderUuid || '';
  folderSel.onchange = () => rg.folderUuid = folderSel.value || null;
  root.appendChild(labeled('Folder', folderSel));

  //Rails (地図で選択して Add — 本家 BoxRailList)
  root.appendChild(listBox('Rails', rg.railPosList, {
    add: { label: 'Add', onclick: () => {
      for (const key of selectedRails){
        const [x, y, z] = key.split(',').map(Number);
        if (!rg.railPosList.some(p => posKey(p) === key)) rg.railPosList.push({x, y, z});
      }
      renderDetail(); renderRails();
    }},
    render: (pos, row) => {
      row.textContent = `${pos.x}, ${pos.y}, ${pos.z}`;
      row.onmouseenter = () => { hoveringRail = posKey(pos); renderRails(); };
      row.onmouseleave = () => { hoveringRail = null; renderRails(); };
    },
    onChange: () => { renderRails(); }
  }));

  //RedStone Pos (key 付き — 本家 BoxPosIntWithKeyList)
  root.appendChild(posListBox('RedStone Pos', rg.rsPosList, true));

  //Display Pos (信号機の位置 — 本家 BoxPosIntList)
  root.appendChild(posListBox('Display Pos', rg.displayPosList, false));

  //Next RailGroup (本家 BoxRailGroupList)
  const nextBox = document.createElement('div');
  nextBox.className = 'box';
  nextBox.innerHTML = `<div class="box-head">Next RailGroup</div>`;
  const nextPaper = document.createElement('div');
  nextPaper.className = 'paper';
  rg.nextRailGroupList.forEach((uuid, i) => {
    const row = document.createElement('div');
    row.className = 'row';
    const input = textInput(uuid, v => rg.nextRailGroupList[i] = v);
    input.className = 'key';
    row.appendChild(input);
    addIcon(row, 'delete', '削除', () => { rg.nextRailGroupList.splice(i, 1); renderDetail(); });
    nextPaper.appendChild(row);
  });
  nextBox.appendChild(nextPaper);
  const addNext = document.createElement('button');
  addNext.className = 'btn outlined'; addNext.textContent = 'Add';
  addNext.style.marginTop = '4px';
  addNext.onclick = () => { rg.nextRailGroupList.push(''); renderDetail(); };
  nextBox.appendChild(addNext);
  root.appendChild(nextBox);

  //Switch Settings (本家 BoxSwitchSettingList)
  const swBox = document.createElement('div');
  swBox.className = 'box';
  swBox.innerHTML = `<div class="box-head">転てつ設定 (Switch Settings)</div>`;
  rg.switchSettings.forEach((setting, si) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.appendChild(labeled('Name', textInput(setting.name, v => setting.name = v)));
    card.appendChild(posRows('Switch RS Pos', setting.switchRsPos, false));
    //settingMap: key → boolean
    const mapDiv = document.createElement('div');
    mapDiv.innerHTML = `<label class="small">Setting Map (key → 転てつ方向)</label>`;
    setting.settingMap.forEach((entry, ei) => {
      const row = document.createElement('div');
      row.className = 'row';
      const keyInput = textInput(entry.key, v => entry.key = v);
      keyInput.className = 'key';
      row.appendChild(keyInput);
      const check = document.createElement('input');
      check.type = 'checkbox'; check.checked = !!entry.value;
      check.onchange = () => entry.value = check.checked;
      row.appendChild(check);
      addIcon(row, 'delete', '削除', () => { setting.settingMap.splice(ei, 1); renderDetail(); });
      mapDiv.appendChild(row);
    });
    const addEntry = document.createElement('button');
    addEntry.className = 'btn outlined'; addEntry.textContent = '+ entry';
    addEntry.onclick = () => { setting.settingMap.push({key:'', value:false}); renderDetail(); };
    mapDiv.appendChild(addEntry);
    card.appendChild(mapDiv);
    const delSetting = document.createElement('button');
    delSetting.className = 'btn outlined'; delSetting.textContent = '設定を削除';
    delSetting.style.marginTop = '4px';
    delSetting.onclick = () => { rg.switchSettings.splice(si, 1); renderDetail(); };
    card.appendChild(delSetting);
    swBox.appendChild(card);
  });
  const addSetting = document.createElement('button');
  addSetting.className = 'btn outlined'; addSetting.textContent = 'Add Setting';
  addSetting.onclick = () => { rg.switchSettings.push({name:'Default Name', switchRsPos:[], settingMap:[]}); renderDetail(); };
  swBox.appendChild(addSetting);
  root.appendChild(swBox);

  //保存 / 削除
  const actions = document.createElement('div');
  actions.style.cssText = 'display:flex;justify-content:space-between;margin-top:8px';
  const save = document.createElement('button');
  save.className = 'btn'; save.textContent = '保存';
  save.onclick = async () => {
    save.disabled = true;
    await fetch(`/api/railgroups/${rg.uuid}`, {method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(rg)});
    await loadRailGroups();
    setActive(rg.uuid);
  };
  const del = document.createElement('button');
  del.className = 'btn danger'; del.textContent = '削除';
  del.onclick = async () => {
    if (!confirm(`RailGroup: ${rg.name} を削除しますか？`)) return;
    await fetch(`/api/railgroups/${rg.uuid}`, {method:'DELETE'});
    activeUUID = null; edit = null;
    await loadRailGroups();
    renderTree(); renderDetail(); renderRails();
  };
  actions.appendChild(save); actions.appendChild(del);
  root.appendChild(actions);
}

function labeled(label, el){
  const div = document.createElement('div');
  div.className = 'box';
  div.innerHTML = `<label class="small">${label}</label>`;
  div.appendChild(el);
  return div;
}
function textInput(value, onchange){
  const input = document.createElement('input');
  input.type = 'text'; input.value = value ?? ''; input.style.width = '100%';
  input.oninput = () => onchange(input.value);
  return input;
}
function listBox(title, list, opts){
  const box = document.createElement('div');
  box.className = 'box';
  const head = document.createElement('div');
  head.className = 'box-head';
  head.textContent = title;
  if (opts.add){
    const b = document.createElement('button');
    b.className = 'btn outlined'; b.textContent = opts.add.label;
    b.onclick = opts.add.onclick;
    head.appendChild(b);
  }
  box.appendChild(head);
  const paper = document.createElement('div');
  paper.className = 'paper';
  list.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'row';
    const span = document.createElement('span');
    span.style.flex = '1';
    opts.render(item, span);
    row.appendChild(span);
    addIcon(row, 'delete', '削除', () => { list.splice(i, 1); renderDetail(); if (opts.onChange) opts.onChange(); });
    paper.appendChild(row);
  });
  box.appendChild(paper);
  return box;
}
//x,y,z(,key) の編集可能リスト
function posListBox(title, list, withKey){
  const box = document.createElement('div');
  box.className = 'box';
  box.innerHTML = `<div class="box-head">${title}</div>`;
  box.appendChild(posRows(null, list, withKey));
  return box;
}
function posRows(label, list, withKey){
  const div = document.createElement('div');
  if (label) div.innerHTML = `<label class="small">${label}</label>`;
  const paper = document.createElement('div');
  paper.className = 'paper';
  list.forEach((pos, i) => {
    const row = document.createElement('div');
    row.className = 'row';
    for (const axis of ['x','y','z']){
      const input = document.createElement('input');
      input.type = 'number'; input.value = pos[axis] ?? 0; input.placeholder = axis;
      input.oninput = () => pos[axis] = parseInt(input.value) || 0;
      row.appendChild(input);
    }
    if (withKey){
      const key = document.createElement('input');
      key.type = 'text'; key.className = 'key'; key.placeholder = 'key (省略可)';
      key.value = pos.key ?? '';
      key.oninput = () => pos.key = key.value;
      row.appendChild(key);
    }
    addIcon(row, 'delete', '削除', () => { list.splice(i, 1); renderDetail(); });
    paper.appendChild(row);
  });
  div.appendChild(paper);
  const add = document.createElement('button');
  add.className = 'btn outlined'; add.textContent = 'Add';
  add.style.marginTop = '4px';
  add.onclick = () => { list.push(withKey ? {x:0,y:0,z:0,key:''} : {x:0,y:0,z:0}); renderDetail(); };
  div.appendChild(add);
  return div;
}

//---------------- API ----------------
async function createRailGroup(){
  const rg = await (await fetch('/api/railgroups', {method:'POST'})).json();
  await loadRailGroups();
  setActive(rg.uuid);
}
async function createFolder(parentUuid){
  const folder = await (await fetch('/api/railgroups/folders', {method:'POST'})).json();
  if (parentUuid){
    folder.parentUuid = parentUuid;
    await fetch(`/api/railgroups/folders/${folder.uuid}`, {method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(folder)});
  }
  await loadFolders();
  renderTree();
}
async function renameFolder(folder){
  const name = prompt('フォルダ名', folder.name);
  if (name == null || name === folder.name) return;
  folder.name = name;
  await fetch(`/api/railgroups/folders/${folder.uuid}`, {method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(folder)});
  await loadFolders();
  renderTree();
}
async function deleteFolder(folder){
  if (!confirm(`フォルダ: ${folder.name} を削除しますか？ (中身は親フォルダへ移動)`)) return;
  await fetch(`/api/railgroups/folders/${folder.uuid}`, {method:'DELETE'});
  await Promise.all([loadFolders(), loadRailGroups()]);
  renderTree();
}
async function loadRailGroups(){ railGroups = await (await fetch('/api/railgroups')).json(); }
async function loadFolders(){ folders = await (await fetch('/api/railgroups/folders')).json(); }

(async function init(){
  const [rails, signals, waypoints] = await Promise.all([
    fetch('/api/rails').then(r => r.json()),
    fetch('/api/signals').then(r => r.json()).catch(() => []),
    fetch('/api/waypoints').then(r => r.json()).catch(() => []),
    loadRailGroups(), loadFolders()
  ]);
  railList = rails; signalList = signals; waypointList = waypoints;
  //初期表示: レール全体が入るよう中心へ
  if (railList.length){
    const xs = railList.map(r => r.pos.x), zs = railList.map(r => r.pos.z);
    const cx = (Math.min(...xs) + Math.max(...xs)) / 2, cz = (Math.min(...zs) + Math.max(...zs)) / 2;
    const rect = svg.getBoundingClientRect();
    tx = rect.width / 2 - cx; ty = rect.height / 2 - cz;
    applyTransform();
  }
  renderRails(); renderSignals(); renderTree(); renderDetail();
  //在線状態は 3 秒ごとに更新 (レール色)
  setInterval(async () => {
    try {
      railList = await (await fetch('/api/rails')).json();
      renderRails();
    } catch (e) {}
  }, 3000);
})();
</script>
